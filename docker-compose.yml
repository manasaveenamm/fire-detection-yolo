version: '3.8'

services:
  # Your local, private container registry
  registry:
    image: registry:2
    container_name: local-registry
    ports:
      - "5001:5000" # Maps port 5001 on EC2 to the registry
    volumes:
      - registry_data:/var/lib/registry

  # Your Jenkins Server
  jenkins:
    image: jenkins/jenkins:lts
    container_name: jenkins-server
    user: root
    ports:
      - "8080:8080"
      - "50000:50000"
    volumes:
      - jenkins_home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock # Allows Jenkins to build images
    depends_on:
      - registry

volumes:
  jenkins_home:
  registry_data:
